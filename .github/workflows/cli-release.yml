name: CLI Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build CLI (cross-compile)
        run: make build-all

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum citadel-cli-* > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          draft: false
          prerelease: false
